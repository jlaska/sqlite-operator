{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sqlite-operator.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sqlite-operator.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "sqlite-operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: webhook
      port: 443
      targetPort: {{ .Values.webhook.port }}
      protocol: TCP
{{- end }}
