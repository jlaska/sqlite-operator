    name: v1
    schema:
      openAPIV3Schema:
        description: LitestreamReplica is the Schema for the litestreamreplicas API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: LitestreamReplicaSpec defines the desired state of LitestreamReplica.
            properties:
              backup:
                description: Backup defines the Litestream replication / backup configuration.
                properties:
                  autoRestore:
                    default: false
                    description: |-
                      AutoRestore, when true, replaces the archive-check init container with an
                      upstream-style restore init container that automatically restores the database
                      from S3 on pod startup (if the local DB is missing and a backup exists).
                      A PRAGMA quick_check integrity gate is always run after restore; if it fails,
                      the pod is blocked from starting.

                      WARNING: Litestream has known restore corruption issues (#1164, #1220).
                      The integrity gate catches corruption before the app starts. When false
                      (the default), pod startup is blocked if S3 has data but the local DB is
                      missing, requiring explicit recovery via a LitestreamRestore CR.
                    type: boolean
                  destination:
                    description: Destination specifies where backups are stored.
                    properties:
                      s3:
                        description: S3 configures an S3-compatible backup destination.
                        properties:
                          bucket:
                            description: Bucket is the name of the S3 bucket.
                            type: string
                          endpoint:
                            description: |-
                              Endpoint is the S3-compatible endpoint URL (e.g. "minio.homelab:9000").
                              Leave empty for AWS S3.
                            type: string
                          path:
                            description: Path is the key prefix within the bucket
                              (e.g. "paperless/").
                            type: string
                          secretRef:
                            description: |-
                              SecretRef names a Secret in the same namespace containing S3 credentials.
                              The Secret must have keys: ACCESS_KEY_ID, SECRET_ACCESS_KEY.
                            type: string
                        required:
                        - bucket
                        - secretRef
                        type: object
                    type: object
                  enabled:
                    default: false
                    description: Enabled controls whether Litestream replication is
                      active.
                    type: boolean
                  logLevel:
                    description: |-
                      LogLevel sets the Litestream logging verbosity via the LITESTREAM_LOG_LEVEL
                      environment variable. Valid values: "debug", "info", "warn", "error".
                      When empty, Litestream's default ("info") is used.
                    enum:
                    - debug
                    - info
                    - warn
                    - error
                    - ""
                    type: string
                  resources:
                    description: |-
                      Resources specifies the compute resource requirements for the Litestream
                      sidecar container. When omitted, a default ephemeral-storage limit is applied
                      to guard against silent disk-fill (upstream issue #1310).
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  retention:
                    description: Retention controls how long backup data is kept.
                    properties:
                      duration:
                        default: 720h
                        description: |-
                          Duration is how long to retain backup data, expressed as a Go duration
                          string (e.g. "720h" for 30 days, "168h" for 7 days).
                          Litestream 0.5.x uses duration-based retention.
                        type: string
                    type: object
                  syncInterval:
                    description: |-
                      SyncInterval overrides the Litestream sync-interval config key, controlling
                      how frequently WAL changes are synced to the replica. Expressed as a Go
                      duration string (e.g. "1s", "500ms"). When empty, the Litestream default (1s)
                      is used and the key is omitted from the generated config.
                    type: string
                required:
                - enabled
                type: object
              databaseName:
                description: DatabaseName is the filename of the SQLite database (e.g.
                  "paperless.db").
                type: string
              databasePath:
                description: |-
                  DatabasePath is the directory path inside the application container where
                  the database file lives (e.g. "/data"). The Litestream sidecar will be
                  configured to watch DatabasePath/DatabaseName.
                type: string
              image:
                default: litestream/litestream:0.5.14
                description: Image overrides the Litestream container image used for
                  the sidecar.
                type: string
              initImage:
                default: keinos/sqlite3:latest
                description: |-
                  InitImage is the container image used for the init container that
                  applies InitSQL. Must include the sqlite3 CLI.
                type: string
              initSQL:
                description: |-
                  InitSQL contains one or more SQL statements to execute against the
                  database on first use. The operator tracks a SHA-256 hash of this
                  content; the statements are (re-)applied only when the hash changes,
                  making updates idempotent across pod restarts.
                  Use IF NOT EXISTS guards to make individual statements safe to re-run.
                type: string
              runAsGroup:
                description: |-
                  RunAsGroup sets the GID for Litestream-managed init containers injected by the webhook.
                  When omitted, the container image's default group is used.
                format: int64
                type: integer
              runAsUser:
                description: |-
                  RunAsUser sets the UID for Litestream-managed init containers injected by the
                  webhook (archive-check, auto-restore, db-init). When set, restored database files
                  are owned by this UID, allowing non-root application containers to read them.
                  When omitted, the container image's default user (root for litestream) is used.
                format: int64
                type: integer
              targetDeployment:
                description: |-
                  TargetDeployment is the name of the existing Deployment in this namespace
                  that the Litestream sidecar should be injected into.
                  Mutually exclusive with TargetStatefulSet.
                type: string
              targetStatefulSet:
                description: |-
                  TargetStatefulSet is the name of an existing StatefulSet in this namespace
                  that the Litestream sidecar should be injected into.
                  Mutually exclusive with TargetDeployment.
                type: string
            required:
            - databaseName
            - databasePath
            type: object
          status:
            description: LitestreamReplicaStatus defines the observed state of LitestreamReplica.
            properties:
              backupHealthy:
                description: BackupHealthy indicates the last backup/replication check
                  succeeded.
                type: boolean
              conditions:
                description: Conditions holds standard Kubernetes condition entries.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              initSQLHash:
                description: |-
                  InitSQLHash is the SHA-256 hash of the InitSQL currently configured in
                  the spec. The init container uses this to name its marker file, so a
                  hash change triggers re-application on next pod rollout.
                type: string
              lastBackup:
                description: LastBackup is the timestamp of the most recent successful
                  backup.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation this status
                  was computed from.
                format: int64
                type: integer
              phase:
                description: 'Phase is the high-level lifecycle state: Configuring,
                  Pending, Ready, Error.'
                type: string
              ready:
                description: Ready mirrors the Ready condition status for quick kubectl
                  output.
                type: boolean
              replicationLag:
                description: ReplicationLag is the approximate lag reported by Litestream
                  (human-readable).
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
