kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: litestreamreplicas.litestream.io
spec:
  group: litestream.io
  names:
    kind: LitestreamReplica
    listKind: LitestreamReplicaList
    plural: litestreamreplicas
    singular: litestreamreplica
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetDeployment
      name: Target
      type: string
    - jsonPath: .spec.databaseName
      name: Database
      type: string
    - jsonPath: .spec.backup.enabled
      name: Backup
      type: boolean
    - jsonPath: .status.phase
