{{- if .Values.webhook.enabled }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "litestream-operator.fullname" . }}-mutating
  labels:
    {{- include "litestream-operator.labels" . | nindent 4 }}
  {{- if .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "litestream-operator.certName" . }}
  {{- end }}
webhooks:
  - name: pod.litestream.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "litestream-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-core-v1-pod
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: "Namespaced"
    objectSelector:
      matchExpressions:
        - key: litestream.io/inject
          operator: In
          values: ["true"]
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    sideEffects: None
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "litestream-operator.fullname" . }}-validating
  labels:
    {{- include "litestream-operator.labels" . | nindent 4 }}
  {{- if .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "litestream-operator.certName" . }}
  {{- end }}
webhooks:
  - name: vlitestreamreplica.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "litestream-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-database-example-com-v1-litestreamreplica
    rules:
      - apiGroups: ["litestream.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["litestreamreplicas"]
        scope: "Namespaced"
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    sideEffects: None
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
{{- end }}
