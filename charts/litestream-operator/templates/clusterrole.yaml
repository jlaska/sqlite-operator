apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "litestream-operator.fullname" . }}-manager
  labels:
    {{- include "litestream-operator.labels" . | nindent 4 }}
rules:
  # Manage SQLiteDB CRs
  - apiGroups: ["litestream.io"]
    resources: ["litestreamreplicas"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["litestream.io"]
    resources: ["litestreamreplicas/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["litestream.io"]
    resources: ["litestreamreplicas/finalizers"]
    verbs: ["update"]
  # Annotate target Deployments and StatefulSets; create Litestream ConfigMaps
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  # Manage SQLiteRestore CRs
  - apiGroups: ["litestream.io"]
    resources: ["litestreamrestores"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["litestream.io"]
    resources: ["litestreamrestores/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["litestream.io"]
    resources: ["litestreamrestores/finalizers"]
    verbs: ["update"]
  # Restore Jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  # Pod inspection for backup health monitoring and log retrieval
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Events for backup health transitions
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  # Metrics endpoint auth
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
