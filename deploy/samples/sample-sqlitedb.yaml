apiVersion: database.example.com/v1
kind: SQLiteDB
metadata:
  name: example-sqlite
  namespace: default
spec:
  databaseName: myapp.db
  databasePath: /data
  targetDeployment: myapp       # name of the existing Deployment to inject into
  image: litestream/litestream:0.3.13
  backup:
    enabled: true
    schedule: "0 */6 * * *"    # snapshot every 6 hours
    destination:
      s3:
        endpoint: minio.homelab:9000   # remove for AWS S3
        bucket: sqlite-backups
        path: myapp/
        secretRef: myapp-s3-creds      # Secret with access-key-id / secret-access-key
    retention:
      count: 10
