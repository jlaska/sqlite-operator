name: Tests

on:
  push:
    branches-ignore: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Running Tests
        run: |
          go mod tidy
          go test ./internal/... -coverprofile=./cover.out -covermode=atomic -coverpkg=./internal/...

      - name: Check coverage thresholds
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yml

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-profile
          path: cover.out

  coverage-badge:
    name: Update coverage badge
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate coverage
        run: go test ./internal/... -coverprofile=./cover.out -covermode=atomic -coverpkg=./internal/...

      - name: Generate and push badge
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yml
          git-token: ${{ github.token }}
          git-branch: badges
