name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jlaska/litestream-operator

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Cache Go modules and envtest binaries
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
          bin/k8s
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: make test

    - name: Run lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.12.2
        args: --timeout=5m

  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to ghcr.io
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Output image
      id: image
      run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}" >> $GITHUB_OUTPUT

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Log in to ghcr.io for Trivy
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: ${{ needs.build.outputs.image }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      continue-on-error: true
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Upload Trivy scan results as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: trivy-results
        path: trivy-results.sarif
        retention-days: 30

  generate-manifests:
    name: Generate Manifests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Generate manifests
      run: make manifests

    - name: Create release artifacts
      run: make ci-deploy-manifests

    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: manifests
        path: release/
        retention-days: 30

  helm-chart:
    name: Package and Push Helm Chart
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v5

    - name: Lint chart
      run: helm lint charts/litestream-operator

    - name: Package chart
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        helm package charts/litestream-operator \
          --version "${VERSION}" \
          --app-version "${VERSION}" \
          --destination release/

    - name: Login to ghcr.io OCI registry
      run: |
        helm registry login ghcr.io \
          -u ${{ github.actor }} \
          -p ${{ secrets.GITHUB_TOKEN }}

    - name: Push chart to OCI registry
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        # Push to ghcr.io/jlaska/charts/litestream-operator to avoid colliding
        # with the container image at ghcr.io/jlaska/litestream-operator.
        helm push "release/litestream-operator-${VERSION}.tgz" oci://ghcr.io/jlaska/charts

    - name: Upload chart artifact
      uses: actions/upload-artifact@v4
      with:
        name: helm-chart
        path: release/litestream-operator-*.tgz
        retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, generate-manifests, helm-chart]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download manifests
      uses: actions/download-artifact@v4
      with:
        name: manifests
        path: release/

    - name: Download Helm chart
      uses: actions/download-artifact@v4
      with:
        name: helm-chart
        path: release/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/litestream-operator.yaml
          release/samples.yaml
          release/litestream-operator-*.tgz
        body: |
          ## Litestream Operator ${{ github.ref_name }}

          ### Container Image
          ```
          ${{ needs.build.outputs.image }}
          ```

          ### Install with Helm
          ```bash
          helm install litestream-operator oci://ghcr.io/jlaska/charts/litestream-operator \
            --version ${{ github.ref_name }} \
            --namespace litestream-operator-system \
            --create-namespace
          ```

          ### Install with kubectl (no Helm)
          ```bash
          kubectl apply -f litestream-operator.yaml
          ```

          ### Changes
          See the commit history for detailed changes in this release.
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') }}
