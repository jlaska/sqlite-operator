# Mounts the webhook serving certificate into the manager pod so that
# controller-runtime's certwatcher can serve the HTTPS webhook endpoint.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: sqlite-operator-system
spec:
  template:
    spec:
      containers:
        - name: manager
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          volumeMounts:
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: cert
              readOnly: true
      volumes:
        - name: cert
          secret:
            defaultMode: 420
            secretName: webhook-server-cert
