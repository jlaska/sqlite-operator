    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: SQLiteDB is the Schema for the sqlitedbs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SQLiteDBSpec defines the desired state of SQLiteDB.
            properties:
              backup:
                description: Backup defines the Litestream replication / backup configuration.
                properties:
                  destination:
                    description: Destination specifies where backups are stored.
                    properties:
                      s3:
                        description: S3 configures an S3-compatible backup destination.
                        properties:
                          bucket:
                            description: Bucket is the name of the S3 bucket.
                            type: string
                          endpoint:
                            description: |-
                              Endpoint is the S3-compatible endpoint URL (e.g. "minio.homelab:9000").
                              Leave empty for AWS S3.
                            type: string
                          path:
                            description: Path is the key prefix within the bucket
                              (e.g. "paperless/").
                            type: string
                          secretRef:
                            description: |-
                              SecretRef names a Secret in the same namespace containing S3 credentials.
                              The Secret must have keys: access-key-id, secret-access-key.
                            type: string
                        required:
                        - bucket
                        - secretRef
                        type: object
                    type: object
                  enabled:
                    default: false
                    description: Enabled controls whether Litestream replication is
                      active.
                    type: boolean
                  retention:
                    description: Retention controls how long backup data is kept.
                    properties:
                      duration:
                        default: 720h
                        description: |-
                          Duration is how long to retain backup data, expressed as a Go duration
                          string (e.g. "720h" for 30 days, "168h" for 7 days).
                          Litestream 0.5.x uses duration-based retention.
                        type: string
                    type: object
                required:
                - enabled
                type: object
              databaseName:
                description: DatabaseName is the filename of the SQLite database (e.g.
                  "paperless.db").
                type: string
              databasePath:
                description: |-
                  DatabasePath is the directory path inside the application container where
                  the database file lives (e.g. "/data"). The Litestream sidecar will be
