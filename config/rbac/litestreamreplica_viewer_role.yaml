# This rule is not used by the project litestream-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to litestream.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: litestream-operator
    app.kubernetes.io/managed-by: kustomize
  name: litestreamreplica-viewer-role
rules:
- apiGroups:
  - litestream.io
  resources:
  - litestreamreplicas
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - litestream.io
  resources:
  - litestreamreplicas/status
  verbs:
  - get
