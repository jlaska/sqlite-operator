---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: litestream-operator-system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: litestream-operator-serving-cert
  namespace: litestream-operator-system
spec:
  # The dnsNames replacements below are patched by kustomize from the
  # webhook-service name and namespace.
  dnsNames:
    - litestream-operator-webhook-service.litestream-operator-system.svc
    - litestream-operator-webhook-service.litestream-operator-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: selfsigned-issuer
  secretName: webhook-server-cert
