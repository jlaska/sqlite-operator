---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: litestream-operator-mutating-webhook
  annotations:
    # cert-manager injects the CA bundle into this annotation when the
    # Certificate is ready. Remove this annotation if not using cert-manager.
    cert-manager.io/inject-ca-from: litestream-operator-system/litestream-operator-serving-cert
webhooks:
  - name: pod.litestream.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: litestream-operator-webhook-service
        namespace: litestream-operator-system
        path: /mutate-core-v1-pod
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: "Namespaced"
    # Only intercept pods that carry the injection annotation.
    objectSelector:
      matchLabels: {}
      matchExpressions:
        - key: litestream.io/inject
          operator: In
          values: ["true"]
    failurePolicy: Fail
    sideEffects: None
    timeoutSeconds: 10
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: litestream-operator-validating-webhook
  annotations:
    cert-manager.io/inject-ca-from: litestream-operator-system/litestream-operator-serving-cert
webhooks:
  - name: vlitestreamreplica.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: litestream-operator-webhook-service
        namespace: litestream-operator-system
        path: /validate-litestream-io-v1-litestreamreplica
    rules:
      - apiGroups: ["litestream.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["litestreamreplicas"]
        scope: "Namespaced"
    failurePolicy: Fail
    sideEffects: None
    timeoutSeconds: 10
