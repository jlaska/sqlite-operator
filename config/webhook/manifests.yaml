---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: sqlite-operator-mutating-webhook
  annotations:
    # cert-manager injects the CA bundle into this annotation when the
    # Certificate is ready. Remove this annotation if not using cert-manager.
    cert-manager.io/inject-ca-from: sqlite-operator-system/sqlite-operator-serving-cert
webhooks:
  - name: pod.sqlite.database.example.com
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: sqlite-operator-webhook-service
        namespace: sqlite-operator-system
        path: /mutate-core-v1-pod
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: "Namespaced"
    # Only intercept pods that carry the injection annotation.
    objectSelector:
      matchLabels: {}
      matchExpressions:
        - key: sqlite.database.example.com/inject
          operator: In
          values: ["true"]
    failurePolicy: Fail
    sideEffects: None
    timeoutSeconds: 10
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: sqlite-operator-validating-webhook
  annotations:
    cert-manager.io/inject-ca-from: sqlite-operator-system/sqlite-operator-serving-cert
webhooks:
  - name: vsqlitedb.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: sqlite-operator-webhook-service
        namespace: sqlite-operator-system
        path: /validate-database-example-com-v1-sqlitedb
    rules:
      - apiGroups: ["database.example.com"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["sqlitedbs"]
        scope: "Namespaced"
    failurePolicy: Fail
    sideEffects: None
    timeoutSeconds: 10
